<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebSocket Test Settings</title>
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
  </head>

  <body>
    <sdpi-item label="Action">
      <sdpi-textfield setting="action" placeholder="ping"></sdpi-textfield>
    </sdpi-item>
    <sdpi-item label="Show Response">
      <sdpi-select setting="responseMode">
        <option value="message">Message</option>
        <option value="none">None</option>
      </sdpi-select>
    </sdpi-item>
  </body>
</html>
